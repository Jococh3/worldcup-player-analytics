<!DOCTYPE html>
<html>
<head>
    <title>Scouting Notes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">⚽ World Cup Analytics</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/players">Players</a>
            <a class="nav-link active" href="/notes">Scouting Notes</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h1 class="mb-4">Scouting Notes</h1>

    <div class="card shadow-sm mb-4">
        <div class="card-header">
            <h4>Add New Note</h4>
        </div>

        <div class="card-body">
            <form method="post" action="/notes/add">

                <div class="mb-3">
                    <label class="form-label">Player</label>
                    <select name="player_id" class="form-select" required>
                        {% for player in players %}
                            <option value="{{ player.player_id }}">
                                {{ player.player_name }} - {{ player.team }} - {{ player.position }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-select">
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Note</label>
                    <textarea name="note_text" class="form-control" rows="3" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Add Note</button>

            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header">
            <h4>Saved Notes</h4>
        </div>

        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Player</th>
                            <th>Team</th>
                            <th>Position</th>
                            <th>Priority</th>
                            <th>Note</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                    {% for note in notes %}
                        <tr>
                            <form method="post" action="/notes/update/{{ note.note_id }}">
                                <td>
                                    <a href="/player/{{ note.player_id }}">
                                        {{ note.player_name }}
                                    </a>
                                </td>
                                <td>{{ note.team }}</td>
                                <td>{{ note.position }}</td>
                                <td>
                                    <select name="priority" class="form-select form-select-sm">
                                        <option value="Low" {% if note.priority == "Low" %}selected{% endif %}>Low</option>
                                        <option value="Medium" {% if note.priority == "Medium" %}selected{% endif %}>Medium</option>
                                        <option value="High" {% if note.priority == "High" %}selected{% endif %}>High</option>
                                    </select>
                                </td>
                                <td>
                                    <textarea name="note_text" class="form-control form-control-sm" rows="2">{{ note.note_text }}</textarea>
                                </td>
                                <td>{{ note.created_at }}</td>
                                <td>
                                    <button type="submit" class="btn btn-sm btn-success mb-1">
                                        Update
                                    </button>
                            </form>

                                    <form method="post" action="/notes/delete/{{ note.note_id }}">
                                        <button type="submit" class="btn btn-sm btn-danger">
                                            Delete
                                        </button>
                                    </form>
                                </td>
                        </tr>
                    {% endfor %}
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

</body>
</html>
